#
# How to use:
#
# 1. copy this file locally
# 2. (optional) uncomment limit_samples in the config file to run with 10 samples for quick testing
# 3. export your HF token in the terminal (some benchmark datasets might be gated)
# 4. run `nemo-evaluator-launcher run --config path/to/nemo_reasoning_evals.yaml`
#
# ⚠️  WARNING:
#     Always run full evaluations (without limit_samples) for actual benchmark results.
#     Using a subset of samples is solely for testing configuration and setup.
#     Results from such test runs should NEVER be used to compare models or
#     report benchmark performance.
defaults:
- execution: local
- deployment: none
- _self_

execution:
  output_dir: # PUT OUTPUT DIRECTORY HERE
  # this line mounts our custom BFCL_v4 suite which omits websearch tasks
  extra_docker_args: >-
    --network=host
  env_vars:
    evaluation: {}

target:
  api_endpoint:
    model_id: amazon/Primed-HQwen3-8B-GKA-Reasoner
    url: http://localhost:8000/v1/chat/completions
    api_key_name: API_KEY
evaluation:
  env_vars:
    HF_TOKEN: host:HF_TOKEN
  nemo_evaluator_config:
    config:
      params:
        max_new_tokens: 65536
        temperature: 0.99999
        top_p: 0.99999
        parallelism: 64
        request_timeout: 3600 # 1 hour, adjust based on your server's latency
        max_retries: 30
    target:
      api_endpoint:
        adapter_config:
          interceptors:
          - name: request_logging
            enabled: true
            config:
              max_saved_requests: 30
          - name: caching
            enabled: false
          - name: endpoint
            enabled: true
          - name: response_stats
            enabled: true
          - name: response_logging
            enabled: true
            config:
              max_saved_responses: 30

  tasks:
  - name: ns_bfcl_v4
    container: nvcr.io/nvidia/eval-factory/nemo-skills:26.01
    nemo_evaluator_config:
      config:
        params:
          temperature: 0.6
          top_p: 0.95
          extra:
            num_repeats: 1
            args: ++use_client_parsing=False
  - name: ns_bfcl_v3
    container: nvcr.io/nvidia/eval-factory/nemo-skills:26.01
    nemo_evaluator_config:
      config:
        params:
          temperature: 0.6
          top_p: 0.95
          extra:
            num_repeats: 1
            args: ++use_client_parsing=False
  - name: ns_aime2024
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 10
  - name: ns_aime2025
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 10
  - name: ns_gpqa
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 8
            args: "++prompt_config=eval/aai/mcq-4choices"
  - name: ns_livecodebench
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 8
            dataset_split: test_v5_2407_2412
  - name: ns_ifbench
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 8
  - name: ns_scicode
    nemo_evaluator_config:
      config:
        params:
          extra:
            num_repeats: 8
          parallelism: 64
