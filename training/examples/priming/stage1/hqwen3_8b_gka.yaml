### Model ###
model_name_or_path: ./models/HQwen3-8B-GKA-Fused
cache_dir: ./hf_cache
overwrite_cache: true

### Distillation ###
stage: hkd
hybrid_lw_distill_target: none
hybrid_distill_pre_lm_head: true  # Apply MSE on final hidden states (before LM head)
hybrid_learnable_params: gka      # Train only SSM parameters

### Dataset ###
dataset: toy_data
tokenized_path: path/to/pre-tokenized-data
cutoff_len: 8192
mix_strategy: interleave_under
preprocessing_num_workers: 32
dataloader_num_workers: 4
packing: true
template: qwen3_nothink_pt
preserve_tokenizer_config: True # Copy over tokenizer_config.json from model_name_or_path to checkpoints

### Training ###
do_train: true
finetuning_type: full
per_device_train_batch_size: 1
gradient_accumulation_steps: 4    # 2M token batch size on 64 GPUs
learning_rate: 1.0e-4
lr_scheduler_type: constant_with_warmup
warmup_steps: 720                 # 3%
max_grad_norm: 1.0
max_steps: 19000
seed: 42
sequence_parallel_size: 1

### Precision & Performance ###
pure_bf16: true                   # Load model in bf16 (remove if using deepspeed stage 3)
bf16: true
flash_attn: fa2
disable_gradient_checkpointing: true
torch_compile: false
enable_liger_kernel: false

### DeepSpeed ###
deepspeed: examples/deepspeed/ds_z0_config.json
ddp_timeout: 180000000

### Output & Logging ###
output_dir: ./models/HQwen3-8B-GKA-Fused/Stage1
logging_steps: 1
save_steps: 1000
plot_loss: false
overwrite_output_dir: false
save_only_model: false
report_to: none
resume_from_checkpoint: null